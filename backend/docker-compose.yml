services:
  livedesk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livedesk
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      # Persist SQLite database across restarts
      - livedesk-data:/app/backend/data
      # Persist HLS segments
      - livedesk-hls:/app/backend/hls_output
      # Mount your own SSL certs to override the self-signed ones
      # - ./certs/key.pem:/app/backend/certs/key.pem:ro
      # - ./certs/cert.pem:/app/backend/certs/cert.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  livedesk-data:
  livedesk-hls:
